name: bun CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        bun-version: [latest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: 2.x
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22.x
      - run: |
          npm install -g esbuild
          deno task dnt
          deno task minify:crystals-kyber-js > test/runtimes/crystals-kyber.js
      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version: ${{ matrix.bun-version }}
      - name: Run test
        working-directory: ./test/runtimes/bun
        run: |
          nohup bun src/index.js &
          sleep 3
          deno test --import-map=../../../npm/import_map.json mlkem.spec.ts --allow-net --config=../../../deno.json
